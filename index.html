<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Clicker Game</title>
  </head>

    <div class="game">

                  <div class="back">
                    <img
                      class="stitchsize"
                      src="./img/EmojiStitch1.png"
                      width="200px"
                      data-row="0"
                      data-col="0"
                    />
                  </div>
                </div>
              </div>
            </div>
            <div class="col">

                      src="./img/EmojiStitch1.png"

                      data-row="0"
                      data-col="1"

                </div>
              </div>
            </div>
            <div class="col">
              <div class="flip-card">

                      data-row="0"

                </div>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col">
              <div class="flip-card">
                <div class="inner">
                  <div class="front">?</div>
                  <div class="back">
                    <img
                      class="stitchsize"
                      src="./img/EmojiStitch1.png"
                      width="200px"
                      data-row="1"
                      data-col="0"
                    />
                  </div>
                </div>
              </div>
            </div>
            <div class="col">
              <div class="flip-card">

                  <div class="front">?</div>
                  <div class="back">
                    <img
                      class="stitchsize"
                      src="./img/EmojiStitch1.png"
                      width="200px"
                      data-row="1"
                      data-col="1"
                    />
                  </div>
                </div>
              </div>
            </div>
            <div class="col">

                    />

                </div>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col">
              <div class="flip-card">
                <div class="inner">
                  <div class="front">?</div>
                  <div class="back">
                    <img
                      class="stitchsize"
                      src="./img/EmojiStitch1.png"
                      width="200px"
                      data-row="2"
                      data-col="0"

                  </div>
                </div>
              </div>
            </div>
            <div class="col">
              <div class="flip-card">

        <button class="btn">restart</button>
      </div>

    <div class="img-div">

    <script src="./script.js"></script>
